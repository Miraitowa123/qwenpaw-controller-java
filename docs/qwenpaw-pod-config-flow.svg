<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9333ea"/>
    </marker>
    <style>
      text {
        font-family: "Helvetica Neue", Helvetica, Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
        fill: #111827;
      }
      .title {
        font-size: 28px;
        font-weight: 700;
      }
      .subtitle {
        font-size: 14px;
        fill: #6b7280;
      }
      .node-title {
        font-size: 16px;
        font-weight: 700;
      }
      .node-sub {
        font-size: 12px;
        fill: #4b5563;
      }
      .code {
        font-family: Menlo, Consolas, "Liberation Mono", monospace;
        font-size: 10.5px;
        fill: #374151;
      }
      .code-small {
        font-family: Menlo, Consolas, "Liberation Mono", monospace;
        font-size: 9.2px;
        fill: #374151;
      }
      .note {
        font-size: 13px;
        fill: #374151;
      }
      .legend {
        font-size: 12px;
        fill: #6b7280;
      }
    </style>
  </defs>

  <rect x="0" y="0" width="1600" height="980" fill="#ffffff"/>

  <text x="800" y="46" text-anchor="middle" class="title">Pod 创建与配置注入流程</text>
  <text x="800" y="72" text-anchor="middle" class="subtitle">init 容器先从 NAS 公共模板拷贝，主容器再靠 withEnv 读路径</text>

  <!-- Top flow -->
  <rect x="80" y="100" width="180" height="70" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="170" y="128" text-anchor="middle" class="node-title">浏览器 / API</text>
  <text x="170" y="149" text-anchor="middle" class="node-sub">用户请求入口</text>

  <line x1="260" y1="135" x2="290" y2="135" stroke="#2563eb" stroke-width="1.8" marker-end="url(#arrow-blue)"/>

  <rect x="290" y="100" width="260" height="70" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="420" y="128" text-anchor="middle" class="node-title">createDeployment(userId)</text>
  <text x="420" y="149" text-anchor="middle" class="node-sub">生成 Deployment</text>

  <line x1="550" y1="135" x2="580" y2="135" stroke="#2563eb" stroke-width="1.8" marker-end="url(#arrow-blue)"/>

  <rect x="580" y="100" width="220" height="70" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="690" y="128" text-anchor="middle" class="node-title">Kubernetes API</text>
  <text x="690" y="149" text-anchor="middle" class="node-sub">创建并拉起 Pod</text>

  <line x1="800" y1="135" x2="900" y2="185" stroke="#2563eb" stroke-width="1.8" marker-end="url(#arrow-blue)"/>

  <!-- Pod container -->
  <rect x="900" y="170" width="620" height="640" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.6"/>
  <text x="930" y="198" class="node-title">Pod / 1 副本</text>
  <text x="930" y="219" class="node-sub">一个 Pod 里先跑 initContainer，再跑主容器</text>

  <!-- Init lane -->
  <rect x="920" y="235" width="580" height="200" rx="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.4"/>
  <text x="940" y="260" class="node-title">init-config / busybox:1.35</text>
  <text x="940" y="280" class="node-sub">先执行，复制完就退出</text>

  <rect x="940" y="295" width="250" height="120" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.2"/>
  <text x="955" y="316" class="node-title" style="font-size:13px;">挂载</text>
  <text x="955" y="338" class="code">template: /app/qwenpaw-public</text>
  <text x="955" y="356" class="code">data: /app/working</text>
  <text x="955" y="374" class="code">secret: /app/working.secret</text>
  <text x="955" y="392" class="code">backup: /app/working.backups</text>

  <rect x="1210" y="295" width="290" height="120" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.2"/>
  <text x="1225" y="316" class="node-title" style="font-size:13px;">复制命令</text>
  <text x="1225" y="338" class="code-small">cp -af /app/qwenpaw-public/working/.</text>
  <text x="1225" y="356" class="code-small">/app/working/</text>
  <text x="1225" y="374" class="code-small">cp -af /app/qwenpaw-public/working.secret/.</text>
  <text x="1225" y="392" class="code-small">/app/working.secret/</text>
  <text x="1225" y="409" class="code-small">backups: 存在才复制</text>

  <line x1="1210" y1="435" x2="1210" y2="455" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="1222" y="450" class="node-sub">init 完成后</text>

  <!-- Main lane -->
  <rect x="920" y="455" width="580" height="295" rx="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.4"/>
  <text x="940" y="480" class="node-title">qwenpaw 主容器</text>
  <text x="940" y="500" class="node-sub">镜像来自 QWENPAW_IMAGE</text>

  <rect x="940" y="515" width="250" height="180" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.2"/>
  <text x="955" y="536" class="node-title" style="font-size:13px;">withEnv</text>
  <text x="955" y="558" class="code">QWENPAW_WORKING_DIR=/app/working</text>
  <text x="955" y="576" class="code">QWENPAW_SECRET_DIR=/app/working.secret</text>
  <text x="955" y="594" class="code">QWENPAW_CONFIG_FILE=config.json</text>
  <text x="955" y="612" class="code">USER_ID / QWENPAW_USER / AUTH_* </text>

  <rect x="1210" y="515" width="290" height="180" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.2"/>
  <text x="1225" y="536" class="node-title" style="font-size:13px;">应用读取</text>
  <text x="1225" y="558" class="code">/app/working/config.json</text>
  <text x="1225" y="576" class="code">/app/working.secret/providers/*.json</text>
  <text x="1225" y="594" class="code">/app/working.backups/</text>
  <text x="1225" y="612" class="code">config.yaml &lt;- ConfigMap</text>

  <line x1="1190" y1="605" x2="1210" y2="605" stroke="#9333ea" stroke-width="1.8" stroke-dasharray="6,4" marker-end="url(#arrow-purple)"/>

  <!-- NAS template source -->
  <rect x="80" y="300" width="680" height="220" rx="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.4"/>
  <text x="100" y="326" class="node-title">NAS 公共模板</text>
  <text x="100" y="347" class="node-sub">host: /qwenpaw_nas/public</text>
  <text x="100" y="369" class="note">公共文件先放这里，Pod 启动时只负责拷贝</text>

  <rect x="100" y="385" width="640" height="110" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.2"/>
  <text x="120" y="411" class="code">working/config.json</text>
  <text x="120" y="433" class="code">working.secret/providers/active_model.json</text>
  <text x="120" y="455" class="code">working.secret/providers/custom/bocom-provider.json</text>
  <text x="120" y="477" class="code">working.backups/（可选）</text>

  <line x1="760" y1="420" x2="940" y2="335" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="836" y="400" class="node-sub" fill="#166534">template-volume / cp -af</text>

  <!-- Footer note -->
  <rect x="80" y="820" width="1440" height="120" rx="10" fill="#fff7ed" stroke="#fdba74" stroke-width="1.4"/>
  <text x="105" y="852" class="node-title" fill="#9a3412">结论</text>
  <text x="105" y="878" class="note" fill="#9a3412">withEnv 只告诉 qwenpaw 去哪里找文件，不会把文件复制进去。</text>
  <text x="105" y="902" class="note" fill="#9a3412">真正写入 /app/working 和 /app/working.secret 的，是 initContainer 的 cp -af。</text>
  <text x="105" y="926" class="note" fill="#9a3412">QWENPAW_IMAGE 只是主容器镜像；公共模板来自 NAS 的 /qwenpaw_nas/public。</text>

  <line x1="1080" y1="852" x2="1110" y2="852" stroke="#2563eb" stroke-width="1.8" marker-end="url(#arrow-blue)"/>
  <text x="1120" y="856" class="legend">创建 / 启动</text>
  <line x1="1080" y1="878" x2="1110" y2="878" stroke="#16a34a" stroke-width="1.8" marker-end="url(#arrow-green)"/>
  <text x="1120" y="882" class="legend">文件拷贝</text>
  <line x1="1080" y1="904" x2="1110" y2="904" stroke="#9333ea" stroke-width="1.8" stroke-dasharray="6,4" marker-end="url(#arrow-purple)"/>
  <text x="1120" y="908" class="legend">运行时路径</text>
</svg>
