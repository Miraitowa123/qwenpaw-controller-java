<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>进入 QwenPaw</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f5f7fa;
            color: #1f2933;
        }
        .panel {
            width: min(420px, calc(100vw - 32px));
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 24px;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
        }
        .title {
            margin: 0 0 8px;
            font-size: 18px;
            font-weight: 600;
        }
        .message {
            margin: 0;
            font-size: 14px;
            line-height: 1.6;
            color: #52606d;
            word-break: break-word;
        }
        .error {
            color: #c9190b;
        }
    </style>
</head>
<body>
    <main class="panel">
        <h1 class="title">正在进入 QwenPaw</h1>
        <p class="message" id="message">正在登录...</p>
    </main>

    <script>
        // 自动登录 QwenPaw 使用的固定账号参数。
        const LOGIN_PAYLOAD = {
            username: 'admin',
            password: 'admin123',
            expires_in: 86400
        };

        // 页面中展示登录状态或错误信息的元素。
        const messageEl = document.getElementById('message');

        // 更新页面提示文案，并按是否错误切换样式。
        function setMessage(message, isError = false) {
            messageEl.textContent = message;
            messageEl.classList.toggle('error', isError);
        }

        // 设置 userid Cookie，网关会根据这个 Cookie 把请求分流到对应用户 Pod。
        function setUserCookie(userId) {
            document.cookie = `userid=${encodeURIComponent(userId)}; path=/`;
        }

        // 从 URL 获取 user_id，登录 QwenPaw 后跳转到聊天页。
        async function loginAndRedirect() {
            // params 保存当前页面 URL 查询参数。
            const params = new URLSearchParams(window.location.search);

            // userId 是管理台打开用户实例时传入的业务用户 ID。
            const userId = params.get('user_id');

            if (!userId) {
                setMessage('缺少用户参数。', true);
                return;
            }

            setUserCookie(userId);

            // response 是 QwenPaw 登录接口返回结果。
            const response = await fetch('/api/auth/login', {
                method: 'POST',
                credentials: 'include',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(LOGIN_PAYLOAD)
            });

            if (!response.ok) {
                // errorText 尽量保留后端返回的失败原因。
                const errorText = await response.text().catch(() => '');
                throw new Error(errorText || `登录失败，HTTP ${response.status}`);
            }

            // data 中应包含 QwenPaw 前端后续请求使用的 token。
            const data = await response.json();
            if (!data.token) {
                throw new Error('登录响应缺少 token。');
            }

            localStorage.setItem('qwenpaw_auth_token', data.token);
            window.location.replace('/chat');
        }

        // 页面加载后立即执行自动登录，失败时停留在当前页展示原因。
        loginAndRedirect().catch(error => {
            setMessage(error.message || '登录失败。', true);
        });
    </script>
</body>
</html>
